  curriculum: False
  curriculum_params:
    # Supports "fixed" and "automatic" mode.
    # The fixed mode takes a schedule definition:
    #   mode_params:
    #    start_at:  80000
    #    stop_at: 200000
    #    frequency: 10000
    # The automatic mode triggers when the success rate is greater
    # than a threshold and runs for a minimum of steps defined as:
    #   mode_params:
    #     success_rate_threshold: 0.6
    #     minimum_steps_per_curriculum: 10000
    reward_weights:
      punyo_contact_penalty_w:
        mode: "automatic"
        mode_params:
          success_rate_threshold: 0.4
          minimum_steps_per_curriculum: 30000
        operation: "additive"
        value: 0.0003
        direction: "increase"

  randomize_goal: False
  goal_randomization_params:
    # Position ranges in meters.
    # These perturbations are additive and sampled from uniform distributions
    # U(nominal-range, nominal+range) for x and y and
    # U(nominal, nominal+range) for z.
    x_range: 0.1
    y_range: 0.2
    z_range: 0.2  # the z perturbation is applied only upward

  randomize: True
  randomization_params:
    frequency: 720   # Define how many simulation steps between generating new randomizations

    actions:
      range: [0., .02]
      range_correlated: [0, .02] # range for correlated noise, refreshed with freq `frequency`
      operation: "additive"
      distribution: "gaussian"

    sim_params:
      gravity:
        range: [0, 0.1]
        operation: "additive"
        distribution: "gaussian"

    actor_params:
      punyo:
        rigid_shape_properties:
          friction:
            num_buckets: 10
            range: [0.8, 1.2]
            operation: "scaling"
            distribution: "uniform"
        dof_properties:
        # TODO(aykut): Consider increasing the range of these params with a
        # linear schedule as in the examples, e.g.:
        # https://github.com/NVIDIA-Omniverse/IsaacGymEnvs/blob/aeed298638a1f7b5421b38f5f3cc2d1079b6d9c3/isaacgymenvs/cfg/task/Anymal.yaml#L146-L158
          stiffness:
            range: [0.8, 1.2]
            operation: "scaling"
            distribution: "uniform"
          damping:
            range: [0.8, 1.2]
            operation: "scaling"
            distribution: "uniform"

      object:
        scale:
          range: [0.95, 1.05]
          operation: "scaling"
          distribution: "uniform"
          setup_only: True # Property will only be randomized once before simulation is started. See Domain Randomization Documentation for more info.
        rigid_body_properties:
          mass:
            range: [0.9, 1.1]
            operation: "scaling"
            distribution: "uniform"
            setup_only: True # Property will only be randomized once before simulation is started. See Domain Randomization Documentation for more info.
        rigid_shape_properties:
          friction:
            num_buckets: 10
            range: [0.8, 1.2]
            operation: "scaling"
            distribution: "uniform"
